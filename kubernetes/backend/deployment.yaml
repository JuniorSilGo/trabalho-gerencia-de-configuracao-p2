apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: mapub

spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend

        image: jusilgo/mapub-api:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 3001

        envFrom:
        - configMapRef:
            name: backend-config

        - secretRef:
            name: backend-secret

        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"

        readinessProbe:
          httpGet:
            path: /api
            port: 3001
          initialDelaySeconds: 20
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /api
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 15